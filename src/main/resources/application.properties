spring.datasource.password=password_pro


# =========================================
# CONFIGURACIÃ“N DE JPA / HIBERNATE
# ==========================================

# 'update' hace que Spring Boot cree o modifique las tablas en Docker 
# automÃ¡ticamente basado en tus clases @Entity. Â¡SÃºper Ãºtil en desarrollo!

spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de VS Code todas las sentencias SQL que Spring ejecute.
spring.jpa.show-sql=true

# Le dice a Hibernate que use el "lenguaje" especÃ­fico de PostgreSQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# LOGS Y MONITOREO (MODO DETECTIVE)
# ==========================================

# Muestra detalles tÃ©cnicos de las consultas SQL para depurar errores.
logging.level.org.hibernate.SQL=DEBUG

# Muestra los valores reales (nombres, ID, etc.) que se estÃ¡n guardando en las tablas.
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


